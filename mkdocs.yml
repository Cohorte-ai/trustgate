site_name: TrustGate
site_url: https://cohorte-ai.github.io/trustgate/
site_description: Black-box AI reliability certification via self-consistency sampling and conformal calibration
site_author: Charafeddine Mouzouni
repo_url: https://github.com/Cohorte-ai/trustgate
repo_name: Cohorte-ai/trustgate

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - def_list

nav:
  - Home: index.md
  - Getting Started:
      - Concepts: concepts.md
      - Getting Your Questions: getting-questions.md
      - Configuration: configuration.md
      - CLI Reference: cli.md
  - Guides:
      - Canonicalization: canonicalization.md
      - Human Calibration: human-calibration.md
  - Reference:
      - Python API: api-reference.md
      - FAQ: faq.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Cohorte-ai/trustgate

copyright: Copyright &copy; 2026 Charafeddine Mouzouni / Cohorte AI
