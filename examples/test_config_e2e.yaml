endpoint:
  url: "https://api.openai.com/v1/chat/completions"
  model: "gpt-4.1-mini"
  temperature: 0.7
  api_key_env: "OPENAI_API_KEY"

sampling:
  k_fixed: 5
  sequential_stopping: true
  delta: 0.05

canonicalization:
  type: "llm_judge"
  judge_endpoint:
    url: "https://api.openai.com/v1/chat/completions"
    model: "gpt-4.1-nano"
    api_key_env: "OPENAI_API_KEY"

calibration:
  alpha_values: [0.01, 0.05, 0.10, 0.15, 0.20, 0.25, 0.30]
  n_cal: 50
  n_test: 50

questions:
  file: "examples/test_questions_120.csv"
